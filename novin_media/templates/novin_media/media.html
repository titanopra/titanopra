{% extends 'base.html' %}
{% load static %}
{% block base %}
    <!----header end----->
    <div class="page_header_default style_one">
        <div class="parallax_cover">
            <div class="simpleParallax"><img src="{% static 'assets/images/page-header-default.jpg' %}" alt="bg_image"
                                             class="cover-parallax"></div>
        </div>
        <div class="page_header_content">
            <div class="auto-container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="banner_title_inner">
                            <div class="title_page">
                                تکنوال
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-12">
                        <div class="breadcrumbs creote">
                            <ul class="breadcrumb m-auto">
                                <li><a href="{% url 'blog:home' %}">خانه</a></li>
                                <li class="active">نوین مدیا</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!----header----->
    <!----page-CONTENT----->
    <div id="content" class="site-content ">

        <section class="project_all filt_style_two filter_enabled">
            <!--===============spacing==============-->
            <div class="pd_top_90"></div>
            <!--===============spacing==============-->
            <div class="container">
                <div class="project_container clearfix">
                    <div class="row clearfix">
                        {% for i in medias %}
                            <div class="project-wrapper grid-item col-lg-12 col-md-12 col-sm-12 col-xs-12 project_category-coaching">
                                <div class="project_box style_three clearfix">
                                    <div class="content_inner">
                                        <div><a href="project-1-column-grid.html#">{{ i.title }}</a></div>
                                        <h2><a href="project-details.html">{{ i.model }}</a></h2>
                                        <p class="short_desc">{{ i.description }}</p>
                                        <a href="{% url 'media:detail' i.id %}" class="read_more">بیشتر بخوانید <span
                                                class="icon-right-arrow-long"></span></a>
                                    </div>
                                    <div class="image">
                                        <img loading="lazy" width="370" height="247"
                                             src="{{ i.image.url }}"
                                             class="wp-post-image"
                                             alt="تصویر">
                                        <a href="project-details.html" class="pro-link"></a>
                                        <div class="overlay"></div>
                                        <div class="text">
                                            <ul>
                                                <li>تاریخ : <span>آذر 8, 1402</span></li>

                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <!--===============spacing==============-->
            <div class="pd_bottom_90"></div>
            <!--===============spacing==============-->
        </section>
        <!---newsteller--->
{% endblock %}

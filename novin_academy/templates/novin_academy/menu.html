{% extends 'base.html' %}
{% load static %}
{% block base %}
    <!----header end----->
    <div class="page_header_default style_one ">
        <div class="parallax_cover">
            <div class="simpleParallax"><img src="{% static 'assets/images/page-header-default.jpg' %}" alt="bg_image"
                                             class="cover-parallax"></div>
        </div>
        <div class="page_header_content">
            <div class="auto-container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="banner_title_inner">
                            <div class="title_page">
                                تمامی دوره ها
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-12">
                        <div class="breadcrumbs creote">
                            <ul class="breadcrumb m-auto">
                                <li><a href="{% url 'blog:home' %}">خانه</a></li>
                                <li class="active">تمامی دوره ها</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!----header----->
    <!----page-CONTENT----->
    <div id="content" class="site-content ">
        <!--===============spacing==============-->
        <div class="pd_top_90"></div>
        <!--===============spacing==============-->
        <section class="creote-service-box">
            <div class="container">
                <div class="row">
                    {% for i in classes %}
                        <div class="col-xl-4 col-lg-6 col-md-12 col-sm-12 col-xs-12">
                            <div class="service_post style_one">
                                <div class="image">
                                    <div class="overlay"></div>
                                    <img loading="lazy" width="500" height="500"
                                         src="{{ i.image.url }}"
                                         alt="تصویر">
                                </div>
                                <div class="service_content icon_yes">
                                    <div class="icon_box">
                                        <span class="icon icon-thumbs-up icon"></span>
                                    </div>
                                    <h2 class="title_service"><a href="{% url 'academy:team' i.id %}" rel="bookmark">{{ i.title }}</a></h2>
                                    <p class="short_desc">{{ i.description }}</p>
                                    <a class="read_more" href="{% url 'academy:team' i.id %}"> بیشتر بخوانید<i
                                            class="icon-right-arrow-long"></i></a>
                                </div>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            </div>
        </section>
        <!--===============spacing==============-->
        <div class="pd_top_80"></div>
        <!--===============spacing==============-->
        <!---newsteller--->

{% endblock %}
